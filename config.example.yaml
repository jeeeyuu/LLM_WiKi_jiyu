# LLM Wiki Configuration Template
#
# Copy this file to config.yaml and customize for your system.
#
# All paths can be absolute or relative to this file's directory.
# Use forward slashes (/) for portability; ~ expands to home directory.

# ============================================================================
# File Paths
# ============================================================================

paths:
  # Root directory of Zotero data (contains zotero.sqlite and storage/)
  # Windows: typically C:\Users\{username}\Zotero
  # macOS: ~/Library/Application Support/Zotero
  # Linux: ~/.zotero
  zotero_dir: ~/Zotero

  # Root directory of Obsidian vault (scanned by notes_ingest.py)
  # Windows: typically C:\Users\{username}\Documents\Obsidian
  # macOS: ~/Documents/Obsidian or ~/Obsidian
  # Linux: ~/Obsidian
  obsidian_root: ~/Obsidian

  # Path to Python executable (used by batch scripts)
  # Leave empty to use system default python
  python_exe: ""

# ============================================================================
# Zotero Integration
# ============================================================================

zotero:
  # Local HTTP API endpoint for Zotero integration (Zotero must be running)
  # Default: http://127.0.0.1:23119/api/users/0
  # Contact your Zotero admin if the port differs
  api_base: http://127.0.0.1:23119/api/users/0

  # Timeout (seconds) for HTTP requests to Zotero API
  http_timeout: 10

# ============================================================================
# Notes Ingestion (Obsidian → notes/)
# ============================================================================

notes_ingest:
  # Relative paths within obsidian_root to scan (recursive)
  # These folders will be mirrored into notes/ with drift detection
  scan_folders:
    - External Notes
    - Lab Notes
    - Tool Notes
    - Info
    - Clippings

  # Threshold (KB) above which notes are truncated (head+tail)
  # Notes ≤ this size are mirrored verbatim; larger notes get truncated
  verbatim_threshold_kb: 32

  # Head truncation size (KB) — how much of large notes to keep from the start
  head_bytes_kb: 16

  # Tail truncation size (KB) — how much of large notes to keep from the end
  tail_bytes_kb: 8

# ============================================================================
# PDF Extraction (batch_extract.py)
# ============================================================================

extractor:
  # Semantic version of extraction format
  # Increment when extraction parameters change (e.g., new frontmatter fields)
  # This ensures caches invalidate properly
  version: "1.0.0"

  # Primary extractor: "opendataloader-pdf" (preferred, requires Java) or "pypdf"
  # Falls back to pypdf automatically if opendataloader unavailable
  preferred: opendataloader-pdf

# ============================================================================
# Wiki Structure
# ============================================================================

wiki:
  # Directory names (relative to repo root where CLAUDE.md lives)
  # Adjust only if you rename these directories
  papers_dir: papers
  sources_dir: sources
  wiki_dir: wiki
  notes_dir: notes
  documents_dir: documents

# ============================================================================
# Watcher / Dispatch (advanced, for Cowork integration)
# ============================================================================

watcher:
  # Poll interval (seconds) for dispatch queue
  poll_interval: 2

  # Heartbeat file (relative to repo root)
  heartbeat_file: _scripts/_queue/watcher.heartbeat

  # Timeout (seconds) — dispatch refusal if heartbeat older than this
  heartbeat_timeout: 15

  # Dispatch queue directories (relative to repo root)
  queue_inbox: _scripts/_queue/inbox
  queue_outbox: _scripts/_queue/outbox
  queue_dead: _scripts/_queue/dead
